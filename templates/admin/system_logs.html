{% extends "admin/base.html" %}

{% block page_title %}&#x7CFB;&#x7EDF;&#x65E5;&#x5FD7;{% endblock %}

{% block content %}
<div class="terminal-shell">
    <div class="terminal-topbar">
        <div class="terminal-dots" aria-hidden="true">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
        </div>
        <div class="terminal-title">system.log</div>
        <div class="terminal-actions">
            <label class="terminal-toggle">
                <input type="checkbox" id="autoRefreshToggle" checked>
                <span>&#x81EA;&#x52A8;&#x5237;&#x65B0;</span>
            </label>
            <button class="terminal-btn" type="button" id="refreshLogsBtn">&#x5237;&#x65B0;</button>
            <button class="terminal-btn terminal-btn-danger" type="button" id="clearLogsBtn">&#x6E05;&#x7A7A;</button>
        </div>
    </div>

    <div class="terminal-meta">
        <div class="meta-row">
            <span class="meta-label">&#x65E5;&#x5FD7;&#x6587;&#x4EF6;</span>
            <code class="meta-value">{{ log_file_path }}</code>
        </div>
        <div class="meta-row">
            <span class="meta-label">&#x72B6;&#x6001;</span>
            <span class="meta-value" id="logStatusText">&#x51C6;&#x5907;&#x5C31;&#x7EEA;</span>
        </div>
        <div class="meta-row">
            <span class="meta-label">&#x6570;&#x91CF;</span>
            <span class="meta-value" id="logCountText">&#x5F53;&#x524D; {{ logs|length }} &#x6761;</span>
        </div>
    </div>

    <div class="terminal-screen" id="systemLogList">
        {% if logs %}
            {% for item in logs %}
            <div class="terminal-line">{{ item.line }}</div>
            {% endfor %}
        {% else %}
            <div class="terminal-line terminal-line-muted">&#x6682;&#x65E0;&#x65E5;&#x5FD7;&#xFF0C;&#x7CFB;&#x7EDF;&#x4EA7;&#x751F;&#x8F93;&#x51FA;&#x540E;&#x4F1A;&#x663E;&#x793A;&#x5728;&#x8FD9;&#x91CC;&#x3002;</div>
        {% endif %}
    </div>
</div>

<style>
    .terminal-shell {
        background:
            radial-gradient(circle at top right, rgba(34, 197, 94, 0.08), transparent 26%),
            radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 24%),
            #020617;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
    }

    .terminal-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.25rem;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(10, 15, 29, 0.96));
        border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    }

    .terminal-dots {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        min-width: 72px;
    }

    .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        display: inline-block;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .dot-red { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green { background: #28c840; }

    .terminal-title {
        flex: 1;
        text-align: center;
        color: #cbd5e1;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
    }

    .terminal-actions {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        flex-wrap: wrap;
        justify-content: flex-end;
        min-width: 260px;
    }

    .terminal-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        color: #cbd5e1;
        font-size: 0.9rem;
    }

    .terminal-btn {
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.9);
        color: #e2e8f0;
        border-radius: 10px;
        padding: 0.55rem 0.9rem;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .terminal-btn:hover {
        background: rgba(30, 41, 59, 0.95);
        border-color: rgba(148, 163, 184, 0.3);
        transform: translateY(-1px);
    }

    .terminal-btn-danger {
        color: #fecaca;
        border-color: rgba(248, 113, 113, 0.25);
        background: rgba(69, 10, 10, 0.55);
    }

    .terminal-btn-danger:hover {
        background: rgba(127, 29, 29, 0.72);
        border-color: rgba(248, 113, 113, 0.4);
    }

    .terminal-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.8rem;
        padding: 1rem 1.25rem;
        background: rgba(3, 7, 18, 0.92);
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    }

    .meta-row {
        min-width: 0;
    }

    .meta-label {
        display: block;
        margin-bottom: 0.35rem;
        color: #64748b;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .meta-value {
        color: #dbeafe;
        font-size: 0.9rem;
        word-break: break-all;
        font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
    }

    .terminal-screen {
        background:
            linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
            #020617;
        background-size: 100% 28px, 28px 100%, auto;
        padding: 1rem 1.25rem 1.25rem;
        max-height: 72vh;
        overflow-y: auto;
        font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
    }

    .terminal-line {
        color: #d1fae5;
        font-size: 0.92rem;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
        padding: 0.08rem 0;
        text-shadow: 0 0 8px rgba(16, 185, 129, 0.08);
    }

    .terminal-line::before {
        content: "> ";
        color: #22c55e;
    }

    .terminal-line-muted {
        color: #94a3b8;
        text-shadow: none;
    }

    .terminal-line-muted::before {
        color: #475569;
    }

    @media (max-width: 900px) {
        .terminal-topbar,
        .terminal-meta {
            grid-template-columns: 1fr;
            display: grid;
        }

        .terminal-dots,
        .terminal-title,
        .terminal-actions {
            min-width: 0;
            width: 100%;
            justify-content: flex-start;
            text-align: left;
        }

        .terminal-title {
            order: -1;
        }

        .terminal-meta {
            grid-template-columns: 1fr;
        }
    }
</style>

<script>
    const logLimit = {{ log_limit|int }};
    let autoRefreshTimer = null;

    function escapeHtml(text) {
        return String(text || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderSystemLogs(logs) {
        const logList = document.getElementById('systemLogList');
        const logCountText = document.getElementById('logCountText');
        logCountText.textContent = `\u5f53\u524d ${logs.length} \u6761`;

        if (!Array.isArray(logs) || logs.length === 0) {
            logList.innerHTML = '<div class="terminal-line terminal-line-muted">\u6682\u65e0\u65e5\u5fd7\uff0c\u7cfb\u7edf\u4ea7\u751f\u8f93\u51fa\u540e\u4f1a\u663e\u793a\u5728\u8fd9\u91cc\u3002</div>';
            return;
        }

        logList.innerHTML = logs.map(item => `
            <div class="terminal-line">${escapeHtml(item.line || '')}</div>
        `).join('');
    }

    async function refreshSystemLogs(showBusyState = false) {
        const statusText = document.getElementById('logStatusText');
        if (showBusyState) {
            statusText.textContent = '\u6b63\u5728\u5237\u65b0\u7cfb\u7edf\u65e5\u5fd7...';
        }
        try {
            const response = await fetch(`/admin/system_logs/data?limit=${logLimit}`);
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data?.message || `HTTP ${response.status}`);
            }
            renderSystemLogs(data.logs || []);
            statusText.textContent = `\u6700\u8fd1\u5237\u65b0\uff1a${new Date().toLocaleTimeString('zh-CN', { hour12: false })}`;
        } catch (error) {
            statusText.textContent = `\u5237\u65b0\u5931\u8d25\uff1a${error.message || error}`;
        }
    }

    function restartAutoRefresh() {
        if (autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
        }
        if (document.getElementById('autoRefreshToggle').checked) {
            autoRefreshTimer = setInterval(() => refreshSystemLogs(false), 5000);
        }
    }

    document.getElementById('refreshLogsBtn').addEventListener('click', () => {
        refreshSystemLogs(true);
    });

    document.getElementById('autoRefreshToggle').addEventListener('change', restartAutoRefresh);

    document.getElementById('clearLogsBtn').addEventListener('click', async () => {
        if (!confirm('\u786e\u8ba4\u6e05\u7a7a\u540e\u53f0\u663e\u793a\u7684\u7cfb\u7edf\u65e5\u5fd7\u6587\u4ef6\u5417\uff1f')) {
            return;
        }
        const statusText = document.getElementById('logStatusText');
        statusText.textContent = '\u6b63\u5728\u6e05\u7a7a\u7cfb\u7edf\u65e5\u5fd7...';
        try {
            const response = await fetch('/admin/system_logs/clear', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            const data = await response.json();
            if (!response.ok || !data.success) {
                throw new Error(data?.message || `HTTP ${response.status}`);
            }
            renderSystemLogs([]);
            statusText.textContent = data.message || '\u7cfb\u7edf\u65e5\u5fd7\u5df2\u6e05\u7a7a';
        } catch (error) {
            statusText.textContent = `\u6e05\u7a7a\u5931\u8d25\uff1a${error.message || error}`;
        }
    });

    restartAutoRefresh();
</script>
{% endblock %}
