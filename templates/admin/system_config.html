{% extends "admin/base.html" %}

{% block page_title %}系统配置{% endblock %}

{% block content %}
<style>
    .config-card {
        padding: 1.25rem;
    }

    .config-card .card-header {
        margin-bottom: 1rem;
        padding-bottom: 0.85rem;
    }

    .config-actions {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
    }

    .config-save {
        border-radius: 8px;
        padding: 0.65rem 1.1rem;
    }

    .config-layout {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
    }

    .config-section {
        background: rgba(15, 23, 42, 0.46);
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-left: 4px solid var(--section-accent, #667eea);
        border-radius: 8px;
        padding: 1rem;
        min-width: 0;
    }

    .config-section-wide {
        grid-column: 1 / -1;
    }

    .config-section-title {
        margin: 0 0 0.8rem 0;
        color: var(--section-accent, #e2e8f0);
        font-size: 1rem;
        font-weight: 800;
    }

    .config-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
    }

    .config-grid-three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .config-field {
        min-width: 0;
    }

    .config-field-full {
        grid-column: 1 / -1;
    }

    .config-field label:not(.admin-switch) {
        display: block;
        margin-bottom: 0.35rem;
        color: #e5e7eb;
        font-size: 0.84rem;
        font-weight: 700;
    }

    .config-field .form-control {
        min-height: 40px;
        padding: 0.58rem 0.75rem;
        border-radius: 8px;
    }

    .config-field textarea.form-control {
        min-height: 74px;
        resize: vertical;
    }

    .config-hint {
        display: block;
        margin-top: 0.35rem;
        color: #94a3b8;
        font-size: 0.78rem;
        line-height: 1.45;
    }

    .config-switch-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.7rem;
    }

    .config-switch-item {
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 8px;
        padding: 0.75rem;
        background: rgba(30, 41, 59, 0.32);
        min-width: 0;
    }

    .config-switch-item .admin-switch {
        font-size: 0.9rem;
    }

    .mail-switch-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.7rem;
    }

    @media (max-width: 1100px) {
        .config-layout,
        .config-grid,
        .config-grid-three,
        .config-switch-grid,
        .mail-switch-row {
            grid-template-columns: 1fr;
        }

        .config-section-wide {
            grid-column: auto;
        }
    }
</style>

<div class="card config-card">
    <div class="card-header">
        <h2 class="card-title">⚙️ 配置管理</h2>
        <div class="config-actions">
            <button type="button" class="btn config-save" onclick="saveAllConfigs()">保存所有配置</button>
        </div>
    </div>

    <form id="configForm">
        <div class="config-layout">
            <section class="config-section" style="--section-accent: #667eea;">
                <h3 class="config-section-title">🤖 AI 配置</h3>
                <div class="config-grid">
                    <div class="config-field config-field-full">
                        <label>AI API 密钥</label>
                        <input type="password" name="ai_api_key" class="form-control"
                               value="{{ configs.get('ai_api_key', '') }}"
                               placeholder="请输入 AI API 密钥">
                    </div>
                    <div class="config-field config-field-full">
                        <label>AI API 地址</label>
                        <input type="url" name="ai_api_url" class="form-control"
                               value="{{ configs.get('ai_api_url', 'https://api.deepseek.com/v1/chat/completions') }}"
                               placeholder="AI API 地址">
                    </div>
                    <div class="config-field">
                        <label>AI 模型</label>
                        <input type="text" name="ai_model" class="form-control"
                               value="{{ configs.get('ai_model', 'deepseek-chat') }}"
                               placeholder="AI 模型名称">
                    </div>
                </div>
            </section>

            <section class="config-section" style="--section-accent: #28a745;">
                <h3 class="config-section-title">📧 邮件配置</h3>
                <div class="config-grid">
                    <div class="config-field config-field-full mail-switch-row">
                        <div class="config-switch-item">
                            <label class="admin-switch">
                                <input type="checkbox" name="notify_email_enabled"
                                       {{ 'checked' if configs.get('notify_email_enabled', 'true') == 'true' else '' }}>
                                <span class="admin-switch-track" aria-hidden="true"></span>
                                <span class="admin-switch-text">启用邮件推送</span>
                            </label>
                        </div>
                        <div class="config-switch-item">
                            <label class="admin-switch">
                                <input type="checkbox" name="require_email_verification"
                                       {{ 'checked' if configs.get('require_email_verification', 'false') == 'true' else '' }}>
                                <span class="admin-switch-track" aria-hidden="true"></span>
                                <span class="admin-switch-text">需要邮箱验证</span>
                            </label>
                        </div>
                    </div>
                    <div class="config-field">
                        <label>SMTP 服务器</label>
                        <input type="text" name="smtp_server" class="form-control"
                               value="{{ configs.get('smtp_server', '') }}"
                               placeholder="smtp.gmail.com">
                    </div>
                    <div class="config-field">
                        <label>SMTP 端口</label>
                        <input type="number" name="smtp_port" class="form-control"
                               value="{{ configs.get('smtp_port', '587') }}"
                               placeholder="587">
                    </div>
                    <div class="config-field">
                        <label>SMTP 用户名</label>
                        <input type="email" name="smtp_username" class="form-control"
                               value="{{ configs.get('smtp_username', '') }}"
                               placeholder="your-email@example.com">
                    </div>
                    <div class="config-field">
                        <label>SMTP 密码</label>
                        <input type="password" name="smtp_password" class="form-control"
                               value="{{ configs.get('smtp_password', '') }}"
                               placeholder="应用专用密码">
                    </div>
                    <div class="config-field config-field-full">
                        <label>激活申请通知邮箱</label>
                        <input type="text" name="activation_request_notify_emails" class="form-control"
                               value="{{ configs.get('activation_request_notify_emails', '') }}"
                               placeholder="多个邮箱用英文逗号分隔；留空则发给所有管理员账号邮箱">
                    </div>
                </div>
            </section>

            <section class="config-section" style="--section-accent: #ffc107;">
                <h3 class="config-section-title">🎟️ 邀请系统配置</h3>
                <div class="config-grid">
                    <div class="config-field">
                        <label>每日邀请码生成限制</label>
                        <input type="number" name="invite_daily_limit" class="form-control"
                               value="{{ configs.get('invite_daily_limit', '3') }}"
                               min="1" max="50" placeholder="3">
                    </div>
                    <div class="config-field">
                        <label>邀请码有效期（天）</label>
                        <input type="number" name="invite_code_validity_days" class="form-control"
                               value="{{ configs.get('invite_code_validity_days', '7') }}"
                               min="1" max="365" placeholder="7">
                    </div>
                    <div class="config-field">
                        <label>预测记录保留期（天，0 为永久）</label>
                        <input type="number" name="prediction_record_retention_days" class="form-control"
                               value="{{ configs.get('prediction_record_retention_days', '365') }}"
                               min="0" max="365" placeholder="365">
                    </div>
                    <div class="config-field">
                        <label>站内通知保留期（天，0 为永久）</label>
                        <input type="number" name="user_notification_retention_days" class="form-control"
                               value="{{ configs.get('user_notification_retention_days', '365') }}"
                               min="0" max="365" placeholder="365">
                    </div>
                    <div class="config-field">
                        <label>回测快照保留期（天，0 为永久）</label>
                        <input type="number" name="backtest_runs_retention_days" class="form-control"
                               value="{{ configs.get('backtest_runs_retention_days', '90') }}"
                               min="0" max="365" placeholder="90">
                    </div>
                </div>
            </section>

            <section class="config-section" style="--section-accent: #dc3545;">
                <h3 class="config-section-title">🔧 系统设置</h3>
                <div class="config-grid">
                    <div class="config-field">
                        <label>系统名称</label>
                        <input type="text" name="system_name" class="form-control"
                               value="{{ configs.get('system_name', 'AI数据分析预测系统') }}"
                               placeholder="AI数据分析预测系统">
                    </div>
                    <div class="config-field">
                        <label>站点名称</label>
                        <input type="text" name="site_name" class="form-control"
                               value="{{ configs.get('site_name', 'AI数据分析预测系统') }}"
                               placeholder="用于邮件和页面展示的站点名称">
                    </div>
                    <div class="config-field">
                        <label>SEO 标题</label>
                        <input type="text" name="seo_title" class="form-control"
                               value="{{ configs.get('seo_title') or '彩研所 - 香港澳门彩票数据分析与智能预测' }}"
                               placeholder="用于浏览器标题和搜索结果标题">
                    </div>
                    <div class="config-field">
                        <label>SEO 描述</label>
                        <textarea name="seo_description" class="form-control" rows="2"
                                  placeholder="用于页面 meta description，建议 80-160 字">{{ configs.get('seo_description') or '彩研所提供香港、澳门彩票开奖记录、生肖号码、波色单双、历史走势和智能预测分析，帮助用户快速查看开奖数据并辅助选号研究，仅供数据分析参考。' }}</textarea>
                    </div>
                </div>
            </section>

            <section class="config-section" style="--section-accent: #22c55e;">
                <h3 class="config-section-title">🛡️ 人机验证配置</h3>
                <div class="config-grid">
                    <div class="config-field config-field-full">
                        <label class="admin-switch">
                            <input type="checkbox" name="enable_turnstile"
                                   {{ 'checked' if configs.get('enable_turnstile', 'false') == 'true' else '' }}>
                            <span class="admin-switch-track" aria-hidden="true"></span>
                            <span class="admin-switch-text">启用人机验证</span>
                        </label>
                    </div>
                    <div class="config-field">
                        <label>Turnstile Site Key</label>
                        <input type="text" name="turnstile_site_key" class="form-control"
                               value="{{ configs.get('turnstile_site_key', '') }}"
                               placeholder="Cloudflare Turnstile 站点密钥">
                    </div>
                    <div class="config-field">
                        <label>Turnstile Secret Key</label>
                        <input type="password" name="turnstile_secret_key" class="form-control"
                               value="{{ configs.get('turnstile_secret_key', '') }}"
                               placeholder="Cloudflare Turnstile 私钥">
                    </div>
                </div>
            </section>

            <section class="config-section" style="--section-accent: #64748b;">
                <h3 class="config-section-title">🐙 GitHub 登录配置</h3>
                <div class="config-grid">
                    <div class="config-field config-field-full">
                        <label class="admin-switch">
                            <input type="checkbox" name="enable_github_login"
                                   {{ 'checked' if configs.get('enable_github_login', 'false') == 'true' else '' }}>
                            <span class="admin-switch-track" aria-hidden="true"></span>
                            <span class="admin-switch-text">启用 GitHub 登录</span>
                        </label>
                    </div>
                    <div class="config-field">
                        <label>GitHub Client ID</label>
                        <input type="text" name="github_client_id" class="form-control"
                               value="{{ configs.get('github_client_id', '') }}"
                               placeholder="GitHub OAuth App Client ID">
                    </div>
                    <div class="config-field">
                        <label>GitHub Client Secret</label>
                        <input type="password" name="github_client_secret" class="form-control"
                               value="{{ configs.get('github_client_secret', '') }}"
                               placeholder="GitHub OAuth App Client Secret">
                    </div>
                </div>
            </section>

            <section class="config-section config-section-wide" style="--section-accent: #0ea5e9;">
                <h3 class="config-section-title">🧩 功能开关与优化</h3>
                <div class="config-grid config-grid-three">
                    <div class="config-switch-grid config-field-full">
                        <div class="config-switch-item">
                            <label class="admin-switch">
                                <input type="checkbox" name="allow_registration"
                                       {{ 'checked' if configs.get('allow_registration', 'true') == 'true' else '' }}>
                                <span class="admin-switch-track" aria-hidden="true"></span>
                                <span class="admin-switch-text">允许用户注册</span>
                            </label>
                        </div>
                        <div class="config-switch-item">
                            <label class="admin-switch">
                                <input type="checkbox" name="enable_personalized_predictions"
                                       {{ 'checked' if configs.get('enable_personalized_predictions', 'false') == 'true' else '' }}>
                                <span class="admin-switch-track" aria-hidden="true"></span>
                                <span class="admin-switch-text">按用户差异化预测</span>
                            </label>
                            <span class="config-hint">关闭后，同一期同策略所有用户使用统一号码。</span>
                        </div>
                        <div class="config-switch-item">
                            <label class="admin-switch">
                                <input type="checkbox" name="auto_optimize_enabled"
                                       {{ 'checked' if configs.get('auto_optimize_enabled', 'false') == 'true' else '' }}>
                                <span class="admin-switch-track" aria-hidden="true"></span>
                                <span class="admin-switch-text">策略自动优化</span>
                            </label>
                            <span class="config-hint">每天晚间基于历史模拟择优调整策略参数。</span>
                        </div>
                    </div>

                    <div class="config-field">
                        <label>自动优化强度</label>
                        <select name="auto_optimize_level" class="form-control">
                            <option value="mild" {{ 'selected' if configs.get('auto_optimize_level', 'balanced') == 'mild' else '' }}>轻度</option>
                            <option value="balanced" {{ 'selected' if configs.get('auto_optimize_level', 'balanced') == 'balanced' else '' }}>均衡</option>
                            <option value="aggressive" {{ 'selected' if configs.get('auto_optimize_level', 'balanced') == 'aggressive' else '' }}>积极</option>
                        </select>
                    </div>
                    <div class="config-field">
                        <label>最小提升阈值</label>
                        <input type="number" name="auto_optimize_min_gain" class="form-control"
                               value="{{ configs.get('auto_optimize_min_gain', '0.6') }}"
                               min="0.1" max="8" step="0.1" placeholder="0.6">
                    </div>
                </div>
            </section>
        </div>
    </form>
</div>

<script>
function saveAllConfigs() {
    document.getElementById('configForm').dispatchEvent(new Event('submit'));
}

document.getElementById('configForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const configs = {};

    const checkboxKeys = [
        'allow_registration',
        'require_email_verification',
        'enable_turnstile',
        'enable_github_login',
        'enable_personalized_predictions',
        'auto_optimize_enabled',
        'notify_email_enabled'
    ];

    for (const [key, value] of formData.entries()) {
        if (checkboxKeys.includes(key)) {
            configs[key] = 'true';
        } else {
            configs[key] = value;
        }
    }

    checkboxKeys.forEach((checkbox) => {
        if (!formData.has(checkbox)) {
            configs[checkbox] = 'false';
        }
    });

    fetch('/admin/system_config/save', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(configs)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showToast('配置保存成功', 'success');
        } else {
            showToast('配置保存失败：' + data.message, 'error');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showToast('配置保存失败：网络错误', 'error');
    });
});

function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.style.cssText =
        'position: fixed;' +
        'top: 20px;' +
        'right: 20px;' +
        'background: ' + (type === 'success' ? '#28a745' : '#dc3545') + ';' +
        'color: white;' +
        'padding: 1rem 1.5rem;' +
        'border-radius: 12px;' +
        'box-shadow: 0 4px 20px rgba(0,0,0,0.2);' +
        'z-index: 9999;' +
        'font-size: 0.9rem;' +
        'max-width: 300px;' +
        'animation: slideIn 0.3s ease;';
    toast.textContent = message;
    document.body.appendChild(toast);

    setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => {
            if (toast.parentElement) {
                toast.parentElement.removeChild(toast);
            }
        }, 300);
    }, 3000);
}

const toastStyle = document.createElement('style');
toastStyle.textContent =
    '@keyframes slideIn {' +
    'from { transform: translateX(100%); opacity: 0; }' +
    'to { transform: translateX(0); opacity: 1; }' +
    '}' +
    '@keyframes slideOut {' +
    'from { transform: translateX(0); opacity: 1; }' +
    'to { transform: translateX(100%); opacity: 0; }' +
    '}';
document.head.appendChild(toastStyle);
</script>
{% endblock %}
