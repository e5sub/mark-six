services:
  mark-six:
    image: ghcr.io/e5sub/mark-six:latest
    container_name: mark-six
    environment:
      - TZ=Asia/Shanghai
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - PYTHONUNBUFFERED=1
      - TRUST_PROXY_HEADERS=1
      - AI_HTTP_CONNECT_TIMEOUT_SECONDS=10
      - AI_HTTP_READ_TIMEOUT_SECONDS=90
      - SECRET_KEY=${SECRET_KEY:?请先设置随机 SECRET_KEY}
      - ENABLE_SCHEDULER=1
      # MySQL support (optional)
      # - DB_TYPE=mysql
      # - DB_HOST=127.0.0.1
      # - DB_PORT=3306
      # - DB_NAME=mark_six
      # - DB_USER=root
      # - DB_PASSWORD=your_password
    volumes: 
      - ./data:/app/data
    ports:
      - "5000:5000"
    restart: unless-stopped
